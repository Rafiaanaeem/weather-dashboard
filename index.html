<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>Weather Dashboard</h1>

        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Enter city name">

            <button id="searchBtn">
                Search
            </button>
        </div>

        <div id="loading">
            Loading...
        </div>

        <div id="errorMessage">

        </div>

        <div class="weather-card">

            <h2 id="cityName">
                City Name
            </h2>

           <img id="weatherIcon" src="" alt="Weather Icon">

<h3 id="temperature">
    0°C
</h3>

            <p id="description">
                Weather Description
            </p>

            <div class="details">

                <div class="detail-box">
                    <h4>Humidity</h4>
                    <p id="humidity">
                        0%
                    </p>
                </div>

                <div class="detail-box">
                    <h4>Wind Speed</h4>
                    <p id="wind">
                        0 km/h
                    </p>
                </div>

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
